aid: cms-blue-button
url: https://raw.githubusercontent.com/api-evangelist/cms-blue-button/refs/heads/main/apis.yml
name: CMS Blue Button 2.0
kind: government
description: Blue Button 2.0 is the Centers for Medicare & Medicaid Services (CMS)
  API that lets Medicare beneficiaries share their Parts A, B, and D claims data
  with applications they trust. It is a FHIR R4 API conforming to the CARIN Blue
  Button Implementation Guide (CARIN Consumer Directed Payer Data Exchange),
  serving ExplanationOfBenefit, Patient, and Coverage resources for 60+ million
  people with Medicare. Access is patient-facing - each beneficiary authorizes an
  app through an OAuth 2.0 authorization-code flow (with mandatory PKCE) on
  Medicare.gov, choosing whether to share demographic data. A self-serve sandbox
  with synthetic enrollee data is open to everyone; production credentials are
  free but require CMS approval of the application.

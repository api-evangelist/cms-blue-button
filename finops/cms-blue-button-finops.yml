description: >-
  FinOps view of Blue Button 2.0 spend. The API is a free U.S. government
  service operated by the Centers for Medicare & Medicaid Services - there is
  no invoice from CMS at any usage level, in sandbox or production. The real
  costs of consuming Blue Button 2.0 sit on the consumer side - engineering
  time to pass CMS production approval (privacy policy, terms of service,
  demo), infrastructure to run the OAuth consent flow and store
  beneficiary-consented FHIR data, and the compliance overhead of handling
  Medicare claims data (breach notification, dormant-account, and third-party
  vendor obligations from the CMS terms).
notes: >-
  There are no vendor charge categories to track. Model internal costs
  instead - per-beneficiary storage and sync compute grow linearly with
  authorized users, and token lifecycles (1-hour access tokens, one-time-use
  refresh tokens) shape polling architecture and compute cost.

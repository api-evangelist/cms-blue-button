meters:
- name: authorized_beneficiaries
  description: Number of Medicare beneficiaries who have authorized the application; drives consumer-side storage and sync compute, not a CMS charge.
  unit: users
  aggregation: sum
  dimensions:
  - application
- name: fhir_requests
  description: FHIR API requests to ExplanationOfBenefit, Patient, and Coverage endpoints; free, but drives consumer-side compute and polling architecture.
  unit: requests
  aggregation: sum
  dimensions:
  - application
  - resource
- name: token_refreshes
  description: OAuth token grants and refreshes; one-hour access tokens and one-time-use refresh tokens shape sync scheduling.
  unit: tokens
  aggregation: sum
  dimensions:
  - application
- name: compliance_overhead
  description: Internal cost of meeting CMS terms - privacy policy upkeep, breach notification readiness, dormant-account handling, vendor reviews.
  unit: hours
  aggregation: sum
  dimensions:
  - application
principles:
- name: Visibility
  description: Track authorized-beneficiary counts and per-resource request volume even though CMS never bills; they are the drivers of your own infrastructure cost.
- name: Allocation
  description: Attribute storage, sync compute, and compliance overhead per product or team consuming Medicare claims data.
- name: Optimization
  description: Poll incrementally with _lastUpdated and page with _count to minimize compute; avoid re-pulling full multi-year claim histories.
- name: Accountability
  description: Assign an owner for CMS terms-of-service compliance and for the production-approval relationship with the Blue Button team.

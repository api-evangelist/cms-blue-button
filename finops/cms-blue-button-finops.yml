serviceCategory: Healthcare Data
billingModel:
  pricingCategory: Free
  billingFrequency: None
  billingCurrency: USD
  chargeCategories: []
focusColumns:
  ServiceName: Blue Button 2.0
  ServiceCategory: Healthcare Data
  ProviderName: Centers for Medicare & Medicaid Services
  PublisherName: Centers for Medicare & Medicaid Services
  InvoiceIssuerName: None (free government service)
  BillingCurrency: USD
